<script>
const COLORS=["#e05c5c","#e0923b","#d4bc17","#7db87d","#4a9fd4","#7b6fcf","#c466a1","#5bbfb0","#8c9b6e","#6e8c9b","#b07d5c","#9b6e8c"];
const DEBTS_INITIAL=[
  {id:2, name:"Currys",       balance:965.72,   apr:39.9, min:25,     arrears:0,        due:15,   account:"personal", note:"Est. figures"},
  {id:3, name:"Natwest CC",   balance:1111.90,  apr:26.9, min:40.03,  arrears:0,        due:10,   account:"personal", note:""},
  {id:4, name:"PayPal",       balance:2017.25,  apr:0,    min:93.44,  arrears:0,        due:11,   account:"personal", note:"0% interest"},
  {id:5, name:"Brewers",      balance:2200.89,  apr:0,    min:0,      arrears:2200.89,  due:1,    account:"business", note:"Trade account — full balance in arrears"},
  {id:6, name:"Amex",         balance:4065.64,  apr:30.4, min:205,    arrears:65.64,    due:28,   account:"business", note:""},
  {id:7, name:"Updraft",      balance:3583.81,  apr:17.9, min:264.66, arrears:793.98,   due:20,   account:"personal", note:""},
  {id:8, name:"Bounce Back",  balance:7733.65,  apr:2.5,  min:182.08, arrears:177.48,   due:14,   account:"business", note:""},
  {id:9, name:"NatWest Loan", balance:17122.68, apr:19,   min:520.01, arrears:2662.97,  due:15,   account:"personal", note:""},
  {id:10,name:"Van",          balance:20600,    apr:0,    min:400,    arrears:0,        due:null, account:"business", note:"Family loan — low priority"},
  {id:11,name:"HMRC",         balance:31510.32, apr:0,    min:0,      arrears:0,        due:null, account:"business", note:"Needs Time to Pay arrangement"},
];

// ---------- State ----------
let debts=[];
let budget=2000;
let sweepPct=50;
let bizPot=0;
let perPot=0;
let savingsPot=0;
let savingsPct=10;
let incomeLog=[]; // {id, amount, bizAmt, perAmt, savedAmt, date}
let paidThisCycle=[]; // array of debt ids paid
let history=[]; // completed cycles, newest first — from debt_plan_cycle_history
let view='cashflow';
let tightThreshold=600;
let lastMilestone='';
let selectedMonth=1;
let editDraft={};
let notifyDaysBefore=3;
let notificationsEnabled=true;
let notifyTestStatus='';
// Web Push to THIS device (the installed PWA), alongside the server-wide
// ntfy transport. States: init (still checking) | unsupported |
// need-install (iOS Safari tab — push only works from the Home Screen app)
// | off | on | busy | denied (blocked in system settings).
let pushState='init';
let swRegistration=null;
// Last-known updated_at per table, echoed back on writes so the server can
// detect a stale save from another device (409) instead of overwriting.
let debtsUpdatedAt=null;
let settingsUpdatedAt=null;
let cashflowUpdatedAt=null;
let conflictBanner='';
let cycleStatus={daysSinceStart:0,promptReset:false};
let cycleResetDismissed=false;
let borrowedActive=[]; // loaded from GET /debt/api/borrowed on init
let borrowedRepaid=[];
let repaidLogExpanded=false;
let loanIsSavings=false;
// Guards against the seed-overwrite trap (efficiency review finding 1):
// until the server state has actually loaded, saving stays off so a slider
// touch can't push DEBTS_INITIAL over the real balances.
let loadedFromServer=false;
let loadFailed=false;
// Set when a save fails (network or 5xx) — surfaced as a banner instead of
// dying silently in the console; the dirty flags retry on the next save.
let saveError=false;

const JSON_HEADERS={'Content-Type':'application/json'};
let persistTimer=null;
// Which collections have local changes the server hasn't seen. Saving only
// what changed keeps a settings tweak from rewriting the debt rows too —
// call persist('settings') etc.; a bare persist() marks everything (safe
// fallback for anything missed).
const dirty={debts:false,settings:false,cashflow:false};
function persist(...kinds){
  (kinds.length?kinds:['debts','settings','cashflow']).forEach(k=>dirty[k]=true);
  clearTimeout(persistTimer);
  persistTimer=setTimeout(persistNow,400);
}
const PERSIST_BODIES={
  debts:()=>({debts,clientUpdatedAt:debtsUpdatedAt}),
  settings:()=>({budget,sweepPct,savingsPct,tightThreshold,lastMilestone,notifyDaysBefore,notificationsEnabled,clientUpdatedAt:settingsUpdatedAt}),
  cashflow:()=>({bizPot,perPot,savingsPot,paidThisCycle,clientUpdatedAt:cashflowUpdatedAt})
};
async function persistNow(){
  if(!loadedFromServer)return; // never push the fallback seed over real data
  const kinds=Object.keys(dirty).filter(k=>dirty[k]);
  if(!kinds.length)return;
  kinds.forEach(k=>dirty[k]=false);
  try{
    const results=await Promise.all(kinds.map(k=>
      fetch('/debt/api/'+k,{method:'POST',headers:JSON_HEADERS,body:JSON.stringify(PERSIST_BODIES[k]())})));
    let failed=false;
    for(let i=0;i<results.length;i++){
      if(!results[i].ok&&results[i].status!==409){dirty[kinds[i]]=true;failed=true;continue;}
      await handleWriteResponse(results[i],kinds[i]);
    }
    if(failed!==saveError){saveError=failed;renderAll();}
  }catch(err){
    kinds.forEach(k=>dirty[k]=true); // retried with the next save
    if(!saveError){saveError=true;renderAll();}
    console.error('Failed to save debt plan state',err);
  }
}
// Applies a write's outcome: on 409, another device saved more recently, so
// hydrate from the fresh copy the server sends back instead of overwriting
// it, and surface the conflict banner. Otherwise just track the new
// updated_at so the next save can be compared correctly.
async function handleWriteResponse(res,kind){
  if(res.status===409){
    const body=await res.json().catch(()=>null);
    if(!body)return;
    if(kind==='debts'){debts=body.current;debtsUpdatedAt=body.updatedAt;}
    else if(kind==='settings'){
      budget=body.current.budget;sweepPct=body.current.sweepPct;savingsPct=body.current.savingsPct;
      tightThreshold=body.current.tightThreshold;lastMilestone=body.current.lastMilestone;
      notifyDaysBefore=body.current.notifyDaysBefore;notificationsEnabled=body.current.notificationsEnabled;
      settingsUpdatedAt=body.updatedAt;
    }else if(kind==='cashflow'){
      bizPot=body.current.bizPot;perPot=body.current.perPot;savingsPot=body.current.savingsPot;
      paidThisCycle=body.current.paidThisCycle;cashflowUpdatedAt=body.updatedAt;
    }
    conflictBanner="Updated on another device — your changes weren't saved. Refreshed to latest.";
    renderAll();
    return;
  }
  if(!res.ok)return;
  const body=await res.json().catch(()=>null);
  if(!body)return;
  if(kind==='debts')debtsUpdatedAt=body.updatedAt;
  else if(kind==='settings')settingsUpdatedAt=body.updatedAt;
  else if(kind==='cashflow')cashflowUpdatedAt=body.updatedAt;
}
async function loadState(){
  const stateLoad=(async()=>{
    const res=await fetch('/debt/api/state');
    if(!res.ok)throw new Error('state load failed: '+res.status);
    const s=await res.json();
    debts=s.debts;
    budget=s.settings.budget;
    sweepPct=s.settings.sweepPct;
    savingsPct=s.settings.savingsPct;
    tightThreshold=s.settings.tightThreshold;
    lastMilestone=s.settings.lastMilestone;
    notifyDaysBefore=s.settings.notifyDaysBefore??3;
    notificationsEnabled=s.settings.notificationsEnabled??true;
    bizPot=s.cashflow.bizPot;
    perPot=s.cashflow.perPot;
    savingsPot=s.cashflow.savingsPot;
    paidThisCycle=s.cashflow.paidThisCycle;
    incomeLog=s.incomeLog;
    debtsUpdatedAt=s.meta?.debtsUpdatedAt||null;
    settingsUpdatedAt=s.meta?.settingsUpdatedAt||null;
    cashflowUpdatedAt=s.meta?.cashflowUpdatedAt||null;
    loadedFromServer=true;
  })().catch(err=>{
    console.error('Failed to load debt plan state, using defaults',err);
    debts=DEBTS_INITIAL.map(d=>({...d}));
    loadFailed=true; // read-only: persistNow() refuses until a real load
  });
  // These endpoints are independent of /api/state and each other — fetch
  // them alongside it instead of one after another (was 4 serialized round
  // trips before first paint).
  await Promise.all([stateLoad,refreshHistory(),refreshCycleStatus(),refreshBorrowed()]);
  renderAll();
}
async function refreshHistory(){
  try{
    const res=await fetch('/debt/api/history');
    history=await res.json();
  }catch(err){console.error('Failed to load cycle history',err);}
}
async function refreshCycleStatus(){
  try{
    const res=await fetch('/debt/api/cycle-status');
    cycleStatus=await res.json();
  }catch(err){console.error('Failed to load cycle status',err);}
}
// Borrowed money tab — fully standalone from the rest of the app's state.
// See Debt Management App/debt-app-borrowed-money.md.
async function refreshBorrowed(){
  try{
    const res=await fetch('/debt/api/borrowed');
    const data=await res.json();
    borrowedActive=data.active||[];
    borrowedRepaid=data.repaid||[];
  }catch(err){console.error('Failed to load borrowed money data',err);}
}
function formatBorrowedDate(d){
  if(!d)return '—';
  return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}
// Snapshot of what this cycle actually paid, for archiving to history.
// Read before debts/paidThisCycle/incomeLog are cleared for the new cycle.
function getCycleArchivePayload(){
  const cyclePayments=getCyclePayments();
  const debtsPaid=cyclePayments.filter(p=>paidThisCycle.includes(p.id)).map(p=>({id:p.id,name:p.name,amount:p.amount}));
  return {debtsPaid,bizPotClose:bizPot,perPotClose:perPot};
}

// For free text (notes, loan sources) interpolated into innerHTML/attribute
// values — a note containing " or < would otherwise break the markup.
const esc=(s)=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=(n)=>'£'+Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtS=(n)=>'£'+Math.round(Math.abs(n)).toLocaleString('en-GB');
const parseNum=(s)=>{const n=parseFloat(String(s).replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};
const ord=(n)=>n+(['st','nd','rd'][n-1]||'th');

function getMonthLabel(m,short=false){
  const d=new Date(2026,6,1);d.setMonth(d.getMonth()+m-1);
  return short?d.toLocaleString('en-GB',{month:'short',year:'2-digit'}):d.toLocaleString('en-GB',{month:'long',year:'numeric'});
}

function simulate(dts,bdgt){
  let state=dts.map(d=>({...d,remainingArrears:d.arrears,remaining:d.balance}));
  const months=[];
  for(let month=1;month<=360;month++){
    let bl=bdgt;const payments=[];
    for(let d of state){
      if(d.remaining<=0.005){payments.push({id:d.id,name:d.name,minPaid:0,arrearsPaid:0,extra:0,total:0,remaining:0,remainingArrears:0,cleared:true,wasActive:false});continue;}
      const interest=(d.apr/100/12)*d.remaining;d.remaining+=interest;
      const minPaid=Math.min(d.min,d.remaining);d.remaining=Math.max(0,d.remaining-minPaid);bl-=minPaid;
      payments.push({id:d.id,name:d.name,minPaid,arrearsPaid:0,extra:0,total:minPaid,remaining:d.remaining,remainingArrears:d.remainingArrears,cleared:false,wasActive:true});
    }
    const arrearsDebts=state.filter(d=>d.remainingArrears>0.005&&d.remaining>0.005);
    const inArrears=arrearsDebts.length>0;
    if(inArrears&&bl>0.005){
      // Highest arrears first — pour the whole leftover budget into the worst one,
      // then roll any remainder onto the next, and so on down the list.
      const ordered=arrearsDebts.slice().sort((a,b)=>b.remainingArrears-a.remainingArrears);
      let remaining=bl;
      for(let d of ordered){
        if(remaining<=0.005)break;
        const pay=Math.min(remaining,d.remainingArrears,d.remaining);
        d.remainingArrears=Math.max(0,d.remainingArrears-pay);d.remaining=Math.max(0,d.remaining-pay);remaining-=pay;
        const pi=payments.findIndex(p=>p.id===d.id);
        payments[pi].arrearsPaid=pay;payments[pi].total+=pay;payments[pi].remaining=d.remaining;payments[pi].remainingArrears=d.remainingArrears;
        if(d.remaining<=0.005)payments[pi].cleared=true;
      }
      bl=remaining;
    }else if(!inArrears&&bl>0.005){
      const target=state.find(d=>d.remaining>0.005);
      if(target){const extra=Math.min(bl,target.remaining);target.remaining=Math.max(0,target.remaining-extra);bl-=extra;
        const pi=payments.findIndex(p=>p.id===target.id);
        payments[pi].extra=extra;payments[pi].total+=extra;payments[pi].remaining=target.remaining;
        if(target.remaining<=0.005)payments[pi].cleared=true;}
    }
    months.push({month,payments,totalOut:bdgt-bl,budgetLeft:bl,phase:inArrears?'arrears':'snowball'});
    if(state.every(d=>d.remaining<=0.005))break;
  }
  return months;
}

// Memoized simulate(debts,budget). Every real change replaces `debts` by
// reference (debts=debts.map(...) / =body.current / =s.debts), so reference
// equality is a correct cache key — renderAll, getCyclePayments and the
// what-if baselines were each re-running the full 360-month sim per render.
let simCache={debts:null,budget:null,months:null};
function getSim(){
  if(simCache.debts!==debts||simCache.budget!==budget){
    simCache={debts,budget,months:simulate(debts,budget)};
  }
  return simCache.months;
}

function getMilestones(months){const m={};for(const mo of months)for(const p of mo.payments)if(p.cleared&&p.wasActive&&!m[p.id])m[p.id]=mo.month;return m;}

// Build the "this cycle" payment list from month 1 of the sim
function getCurrentTarget(){
  // Mirrors the simulate() priority: clear arrears first (HIGHEST arrears first),
  // otherwise snowball the smallest remaining balance. Excludes HMRC (id 11) and zero balances.
  const active=debts.filter(d=>d.balance>0.005 && d.id!==11);
  const arrearsDebts=active.filter(d=>d.arrears>0.005);
  if(arrearsDebts.length){
    // highest arrears first — matches simulate()'s payment order
    return arrearsDebts.slice().sort((a,b)=>b.arrears-a.arrears)[0];
  }
  // snowball: smallest balance overall
  return active.slice().sort((a,b)=>a.balance-b.balance)[0]||null;
}
function getCyclePayments(){
  const months=getSim();
  const m1=months[0];
  if(!m1)return [];
  return m1.payments.filter(p=>p.total>0.005).map(p=>{
    const debt=debts.find(d=>d.id===p.id);
    return {id:p.id,name:p.name,amount:p.total,due:debt?.due??99,arrears:p.arrearsPaid>0.005,snowball:p.extra>0.005};
  }).sort((a,b)=>a.due-b.due);
}

function renderAll(){
  const months=getSim();
  const totalMonths=months.length;
  const totalDebt=debts.reduce((s,d)=>s+d.balance,0);
  const totalArrears=debts.reduce((s,d)=>s+d.arrears,0);
  const phaseSwitch=months.find(m=>m.phase==='snowball');
  const milestones=getMilestones(months);
  const cm=months[Math.min(selectedMonth,totalMonths)-1];

  document.getElementById('budgetSlider').value=budget;
  document.getElementById('budgetLabel').textContent=fmt(budget);

  const stats=[
    {label:'Total Debt',value:fmtS(totalDebt),color:'#7c7f96',border:'#2a2d3e'},
    {label:'In Arrears',value:fmt(totalArrears),color:'#e05c5c',border:'#4a2020'},
    {label:'Arrears Cleared',value:phaseSwitch?getMonthLabel(phaseSwitch.month,true):'—',color:'#7db87d',border:'#1e3a1e'},
  ];
  document.getElementById('statGrid').innerHTML=stats.map(s=>`<div class="stat-card" style="border:1px solid ${s.border}"><div class="stat-label" style="color:${s.color}">${s.label}</div><div class="stat-val" style="color:${s.color}">${s.value}</div></div>`).join('');

  // Chart
  const chartData=months.filter((_,i)=>i%3===0||i===months.length-1);
  const chartMax=Math.max(totalDebt,1);
  const cH=110,cW=500,pad={t:8,r:8,b:26,l:50};
  const toX=i=>pad.l+(i/Math.max(chartData.length-1,1))*(cW-pad.l-pad.r);
  const toY=v=>pad.t+(1-v/chartMax)*(cH-pad.t-pad.b);
  const totals=chartData.map(m=>m.payments.reduce((s,p)=>s+p.remaining,0));
  const pts=totals.map((v,i)=>`${toX(i)},${toY(v)}`).join(' ');
  const gridLines=[0,0.5,1].map(f=>`<line x1="${pad.l}" x2="${cW-pad.r}" y1="${toY(f*chartMax)}" y2="${toY(f*chartMax)}" stroke="#2a2d3e" stroke-width="1"/><text x="${pad.l-4}" y="${toY(f*chartMax)+4}" text-anchor="end" font-size="9" fill="#444">${fmtS(f*chartMax)}</text>`).join('');
  const xLabels=chartData.map((m,i)=>(i%4===0||i===chartData.length-1)?`<text x="${toX(i)}" y="${cH-4}" text-anchor="middle" font-size="8" fill="#444">${getMonthLabel(m.month,true)}</text>`:'').join('');
  document.getElementById('chart').innerHTML=`<defs><linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5b8def"/><stop offset="100%" stop-color="#5b8def" stop-opacity="0"/></linearGradient></defs>${gridLines}<polygon points="${pad.l},${toY(0)} ${pts} ${toX(chartData.length-1)},${toY(0)}" fill="url(#g2)" opacity="0.2"/><polyline points="${pts}" fill="none" stroke="#5b8def" stroke-width="1.5"/>${xLabels}`;

  const tabs=[['cashflow','Cash Flow'],['whatif','What If?'],['monthly','Schedule'],['milestones','Milestones'],['history','History'],['borrowed','Borrowed'],['edit','Edit Debts'],['overview','All Debts']];
  document.getElementById('nav').innerHTML=tabs.map(([k,l])=>`<button onclick="setView('${k}')" style="background:${view===k?'#5b8def':'#1a1d2e'};color:${view===k?'#fff':'#7c7f96'}">${l}</button>`).join('');

  let html='';

  if(loadFailed){
    html+=`<div class="card" style="border:1px solid #5a2a2a;background:#1a0808;border-radius:10px;margin-bottom:8px">
      <div style="font-size:13px;color:#e05c5c;line-height:1.5">⚠ Couldn't load your data — these are placeholder figures and <strong>saving is switched off</strong>. Check your signal and reload.</div>
      <button class="btn-ghost" style="width:100%;margin-top:10px" onclick="location.reload()">Reload</button>
    </div>`;
  }else if(saveError){
    html+=`<div class="card" style="border:1px solid #6a3a1a;background:#1a0f08;border-radius:10px;margin-bottom:8px">
      <div style="font-size:13px;color:#e0923b;line-height:1.5">⚠ Couldn't save — recent changes are only on this device. They'll retry automatically with your next change.</div>
    </div>`;
  }

  if(conflictBanner){
    html+=`<div class="card" style="border:1px solid #6a3a1a;background:#1a0f08;border-radius:10px;margin-bottom:8px">
      <div class="row" style="align-items:flex-start">
        <div style="font-size:13px;color:#e0923b">⚠ ${conflictBanner}</div>
        <button onclick="conflictBanner='';renderAll()" style="background:none;border:none;color:#7c7f96;font-size:16px;padding:0 0 0 8px;flex-shrink:0">×</button>
      </div>
    </div>`;
  }

  // ---------- CASH FLOW (home) ----------
  if(view==='cashflow'){
    const cyclePayments=getCyclePayments();
    const bizPayments=cyclePayments.filter(p=>{const d=debts.find(x=>x.id===p.id);return d&&d.account==='business';});
    const perPayments=cyclePayments.filter(p=>{const d=debts.find(x=>x.id===p.id);return d&&d.account==='personal';});
    const bizCycleTotal=bizPayments.reduce((s,p)=>s+p.amount,0);
    const perCycleTotal=perPayments.reduce((s,p)=>s+p.amount,0);
    const paidBizTotal=bizPayments.filter(p=>paidThisCycle.includes(p.id)).reduce((s,p)=>s+p.amount,0);
    const paidPerTotal=perPayments.filter(p=>paidThisCycle.includes(p.id)).reduce((s,p)=>s+p.amount,0);
    const bizStillNeeded=Math.max(0,bizCycleTotal-paidBizTotal);
    const perStillNeeded=Math.max(0,perCycleTotal-paidPerTotal);
    const nextDue=cyclePayments.find(p=>!paidThisCycle.includes(p.id));
    const totalIn=incomeLog.reduce((s,e)=>s+e.amount,0);

    html+=`<div class="total-card" style="background:linear-gradient(135deg,#1a2535,#141a2e)">
      <div style="display:flex;gap:10px;margin-bottom:14px">
        <div style="flex:1;background:#1a1210;border:1px solid #3a2a1a;border-radius:10px;padding:10px 12px">
          <div style="font-size:10px;color:#e0923b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Business pot</div>
          <div style="font-size:26px;font-weight:800;color:${bizPot>=bizStillNeeded?'#7db87d':'#e0923b'}">${fmt(bizPot)}</div>
          <div style="font-size:11px;color:#7c7f96;margin-top:2px">${bizStillNeeded>0.005?`${fmt(bizStillNeeded)} still needed${bizPot<bizStillNeeded?` · <span style="color:#e05c5c">${fmt(bizStillNeeded-bizPot)} short</span>`:' · <span style="color:#7db87d">covered ✓</span>'}`:'All paid ✓'}</div>
        </div>
        <div style="flex:1;background:#121528;border:1px solid #1a2a4a;border-radius:10px;padding:10px 12px">
          <div style="font-size:10px;color:#5b8def;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Personal pot</div>
          <div style="font-size:26px;font-weight:800;color:${perPot>=perStillNeeded?'#7db87d':'#5b8def'}">${fmt(perPot)}</div>
          <div style="font-size:11px;color:#7c7f96;margin-top:2px">${perStillNeeded>0.005?`${fmt(perStillNeeded)} still needed${perPot<perStillNeeded?` · <span style="color:#e05c5c">${fmt(perStillNeeded-perPot)} short</span>`:' · <span style="color:#7db87d">covered ✓</span>'}`:'All paid ✓'}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary" style="flex:1" onclick="openLogModal()">+ Log money in</button>
        <button class="btn-ghost" onclick="openPotsModal()">Adjust pots</button>
      </div>
    </div>`;

    // Borrowed-money nudge — informational only, no interaction with pots/cashflow.
    const savingsLoans=borrowedActive.filter(b=>b.is_savings);
    if(savingsLoans.length>0){
      const savingsTotal=savingsLoans.reduce((s,b)=>s+b.amount,0);
      const savingsSources=[...new Set(savingsLoans.map(b=>b.source_name))];
      const nudgeText=savingsSources.length===1
        ? `⚠ ${fmt(savingsTotal)} borrowed from ${esc(savingsSources[0])} — repay when you can`
        : `⚠ ${fmt(savingsTotal)} borrowed from savings pots (${esc(savingsSources.join(', '))})`;
      html+=`<div style="background:#2a1a0a;border:1px solid #4a3a1a;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#e0923b;line-height:1.5">${nudgeText}</div>`;
    }

    // Debt-free countdown — motivational context, not the primary action, so kept subtle
    html+=`<div class="card" style="text-align:center;padding:14px;margin-bottom:8px">
      <div style="font-size:10px;color:#7c7f96;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Debt-free in</div>
      <div style="font-size:22px;font-weight:800;color:#fff">${totalMonths} month${totalMonths===1?'':'s'}</div>
      <div style="font-size:12px;color:#555;margin-top:2px">${getMonthLabel(totalMonths,false)}</div>
    </div>`;

    // ── Milestone check ──
    const totalPaid=totalDebt-debts.reduce((s,d)=>s+d.balance,0);
    const pctCleared=totalDebt>0?Math.round((totalPaid/totalDebt)*100):0;
    const allArrearsCleared=debts.every(d=>d.arrears<=0.005);
    // Check for new milestone
    const milestoneKey=allArrearsCleared?'arrears-done':pctCleared>=75?'75pct':pctCleared>=50?'50pct':pctCleared>=25?'25pct':'';
    if(milestoneKey && milestoneKey!==lastMilestone){
      const msgs={
        'arrears-done':{icon:'🎉',title:'Arrears cleared!',sub:'Phase 2 starts now — the snowball is rolling.'},
        '25pct':{icon:'💪',title:'25% cleared!',sub:'One quarter of the debt is gone. Keep going.'},
        '50pct':{icon:'🔥',title:'Halfway there!',sub:'Half the debt cleared. The snowball is picking up speed.'},
        '75pct':{icon:'🏁',title:'75% cleared!',sub:'Nearly there. The finish line is in sight.'},
      };
      const msg=msgs[milestoneKey];
      if(msg){
        html+=`<div style="background:linear-gradient(135deg,#1a3a1a,#0d1a0d);border:1px solid #3a6a3a;border-radius:12px;padding:16px;margin-bottom:16px;text-align:center">
          <div style="font-size:32px;margin-bottom:6px">${msg.icon}</div>
          <div style="font-size:17px;font-weight:700;color:#7db87d">${msg.title}</div>
          <div style="font-size:13px;color:#7c9f7c;margin-top:4px">${msg.sub}</div>
          <button onclick="lastMilestone='${milestoneKey}';persist('settings');renderAll()" style="margin-top:12px;padding:6px 16px;border-radius:6px;border:1px solid #3a6a3a;background:transparent;color:#7db87d;font-size:12px;cursor:pointer">Got it ✓</button>
        </div>`;
      }
    }
    // Progress bar at top
    if(pctCleared>0){
      html+=`<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#555;margin-bottom:4px">
          <span>${pctCleared}% of total debt cleared</span>
          <span>${fmt(totalPaid)} paid off</span>
        </div>
        <div style="background:#2a2d3e;border-radius:6px;height:5px;overflow:hidden">
          <div style="width:${pctCleared}%;height:100%;background:linear-gradient(90deg,#5b8def,#7db87d);border-radius:6px;transition:width .4s"></div>
        </div>
      </div>`;
    }

    // Surplus prompt — all payments done AND money left in pot
    const allDone = cyclePayments.length>0 && cyclePayments.every(p=>paidThisCycle.includes(p.id));
    const targetForSurplus=getCurrentTarget();
    const surplus = targetForSurplus?.account==='business'?bizPot:perPot;
    if(allDone && surplus>0.005){
      const target=getCurrentTarget();
      if(target){
        const isArr=target.arrears>0.005;
        html+=`<div class="card card-green" style="border-radius:12px">
          <div style="font-size:11px;color:#7db87d;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Surplus in pot — put it to work</div>
          <div style="font-size:13px;color:#e8e8ec;line-height:1.5;margin-bottom:12px">
            All bills are paid and you've got <strong style="color:#7db87d">${fmt(surplus)}</strong> left over. Sending it to your current target clears debt faster and shaves time off the plan.
          </div>
          <div style="background:#0f1117;border-radius:8px;padding:10px 12px;margin-bottom:12px">
            <div class="row">
              <div>
                <div style="font-weight:600;font-size:15px">${target.name} ${isArr?'<span class="badge badge-red">ARREARS</span>':'<span class="badge badge-blue">SNOWBALL TARGET</span>'}</div>
                <div style="font-size:12px;color:#7c7f96;margin-top:2px">Current balance ${fmt(target.balance)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:11px;color:#7c7f96">After payment</div>
                <div style="font-weight:700;color:#7db87d">${fmt(Math.max(0,target.balance-surplus))}</div>
              </div>
            </div>
          </div>
          <button class="btn-primary" style="width:100%;background:#7db87d" onclick="applySurplus()">Send ${fmt(surplus)} to ${target.name}</button>
        </div>`;
      }
    }

    // Cycle-reset nudge — same 28-day check as the daily push notification,
    // shown once per page load (dismissing doesn't persist server-side).
    if(cycleStatus.promptReset && !cycleResetDismissed){
      html+=`<div class="card" style="border:1px solid #6a5a1a;background:#1a1608;border-radius:10px;margin-bottom:8px">
        <div class="row" style="align-items:flex-start">
          <div style="font-size:13px;color:#e0c060">📅 Your cycle is ${cycleStatus.daysSinceStart} days old — ready to start a new one?</div>
          <button onclick="cycleResetDismissed=true;renderAll()" style="background:none;border:none;color:#7c7f96;font-size:16px;padding:0 0 0 8px;flex-shrink:0">×</button>
        </div>
        <button class="btn-ghost" style="width:100%;margin-top:10px" onclick="startNewCycle()">Start new cycle</button>
      </div>`;
    }

    // Progress bar of cycle
    const cycleTotal2=bizCycleTotal+perCycleTotal;
    const paidTotal2=paidBizTotal+paidPerTotal;
    const pctPaid=cycleTotal2>0?Math.round((paidTotal2/cycleTotal2)*100):0;
    html+=`<div class="card">
      <div class="row" style="margin-bottom:8px">
        <h2 style="margin:0">This cycle's payments</h2>
        <span style="font-size:12px;color:#7c7f96">${cyclePayments.filter(p=>paidThisCycle.includes(p.id)).length}/${cyclePayments.length} done · ${fmt(paidTotal2)} paid</span>
      </div>
      <div style="background:#0f1117;border-radius:6px;height:6px;overflow:hidden;margin-bottom:14px">
        <div style="width:${pctPaid}%;height:100%;background:#7db87d;border-radius:6px;transition:width .3s"></div>
      </div>`;
    if(nextDue){
      html+=`<div class="card-blue" style="border-radius:8px;padding:10px 12px;margin-bottom:12px;border:1px solid #2a3a5e">
        <div style="font-size:11px;color:#5b8def;text-transform:uppercase;letter-spacing:.06em">Next to pay</div>
        <div class="row" style="margin-top:4px">
          <div><span style="font-weight:600;font-size:15px">${nextDue.name}</span> <span style="font-size:12px;color:#7c7f96">· due ${nextDue.due<99?ord(nextDue.due):'flexible'}</span></div>
          <div style="font-weight:700;color:#5b8def">${fmt(nextDue.amount)}</div>
        </div>
      </div>`;
    }
    cyclePayments.forEach((p,i)=>{
      const done=paidThisCycle.includes(p.id);
      const debt=debts.find(d=>d.id===p.id);
      html+=`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;${i<cyclePayments.length-1?'border-bottom:1px solid #2a2d3e':''}">
        <button class="check ${done?'done':''}" onclick="togglePaid(${p.id})">${done?'✓':''}</button>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-weight:600;${done?'color:#555;text-decoration:line-through':''}">${p.name}</span>
            ${debt?.account==='business'?'<span class="badge" style="background:#2a1a0a;color:#e0923b">BIZ</span>':'<span class="badge" style="background:#0a1228;color:#5b8def">PER</span>'}
            ${p.arrears&&!done?'<span class="badge badge-red">ARREARS</span>':''}
            ${p.snowball&&!done?'<span class="badge badge-blue">SNOWBALL</span>':''}
          </div>
          <div style="font-size:11px;color:#555;margin-top:1px">${p.due<99?'Due '+ord(p.due):'Flexible date'}</div>
        </div>
        <div style="font-weight:700;color:${done?'#555':'#e8e8ec'};${done?'text-decoration:line-through':''}">${fmt(p.amount)}</div>
      </div>`;
    });
    html+=`<div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn-ghost" style="flex:1" onclick="startNewCycle()">Start new cycle</button>
    </div></div>`;

    // HMRC reminder
    const hmrc=debts.find(d=>d.id===11);
    html+=`<div class="card card-yellow">
      <div class="row"><div><div style="font-weight:600">HMRC — ${fmt(hmrc?.balance??0)}</div>
      <div style="font-size:12px;color:#b5b07c;margin-top:2px">Call 0300 200 3835 to set up Time to Pay</div></div></div>
    </div>`;

    // Income log
    if(incomeLog.length){
      html+=`<div class="card"><h2>Money in this cycle</h2>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:#7c7f96">
          <span>In: <strong style="color:#e8e8ec">${fmt(totalIn)}</strong></span>
          <span>Biz pot: <strong style="color:#e0923b">${fmt(incomeLog.reduce((s,e)=>s+(e.bizAmt||0),0))}</strong></span>
          <span>Per pot: <strong style="color:#5b8def">${fmt(incomeLog.reduce((s,e)=>s+(e.perAmt||0),0))}</strong></span>
        </div>`;
      incomeLog.slice().reverse().forEach((e,ri)=>{
        const realIdx=incomeLog.length-1-ri;
        html+=`<div class="log-item">
          <span style="color:#7c7f96">${e.date}</span>
          <span style="font-size:12px">In: <strong>${fmt(e.amount)}</strong> · Biz: <strong style="color:#e0923b">${fmt(e.bizAmt||0)}</strong> · Per: <strong style="color:#5b8def">${fmt(e.perAmt||0)}</strong>${e.savedAmt>0?` · Saved: <strong style="color:#7db87d">${fmt(e.savedAmt)}</strong>`:''}</span>
          <button onclick="deleteIncome(${realIdx})" style="background:none;border:none;color:#e05c5c;font-size:16px;padding:0 4px">×</button>
        </div>`;
      });
      html+=`</div>`;
    }

    // ── Tight week triage ──
    const cycleIncome=incomeLog.reduce((s,e)=>s+e.amount,0);
    if(cycleIncome>0 && cycleIncome<tightThreshold*4.33){
      // This cycle looks tight - show triage
      const today=new Date().getDate();
      const unpaid=cyclePayments.filter(p=>!paidThisCycle.includes(p.id));
      const withPriority=unpaid.map(p=>{
        const debt=debts.find(d=>d.id===p.id);
        const daysUntilDue=debt?.due?((debt.due-today+31)%31):30;
        const inArrears=p.arrears;
        const isHighAPR=(debt?.apr||0)>25;
        const isTrade=debt?.account==='business'&&(debt?.min===0||!debt?.due);
        // Priority scoring
        let priority,color,bg,advice;
        if(inArrears&&daysUntilDue<=7){
          priority='MUST PAY';color='#e05c5c';bg='#3a0d0d';
          advice='Already in arrears — missing this risks default';
        } else if(inArrears||daysUntilDue<=5){
          priority='MUST PAY';color='#e05c5c';bg='#3a0d0d';
          advice=inArrears?'In arrears — pay what you can':'Due very soon';
        } else if(daysUntilDue<=10||isHighAPR){
          priority='PAY SOON';color='#e0923b';bg='#2a1a0a';
          advice=daysUntilDue<=10?`Due in ~${daysUntilDue} days`:'High interest — pay before it grows';
        } else {
          priority='CAN WAIT';color='#7db87d';bg='#0d1a0d';
          advice=isTrade?'Trade account — contact if needed':`Due ${debt?.due?ord(debt.due):'flexibly'} — some breathing room`;
        }
        return {...p,priority,color,bg,advice,daysUntilDue,debt};
      }).sort((a,b)=>{
        const order={'MUST PAY':0,'PAY SOON':1,'CAN WAIT':2};
        return order[a.priority]-order[b.priority]||a.daysUntilDue-b.daysUntilDue;
      });

      html+=`<div class="card" style="border:1px solid #6a3a1a;background:#1a0f08;border-radius:12px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-size:18px">⚠</span>
          <div>
            <div style="font-size:14px;font-weight:700;color:#e0923b">Tight week mode</div>
            <div style="font-size:12px;color:#7c7f96">Income logged (${fmt(cycleIncome)}) looks light — here's what to prioritise</div>
          </div>
        </div>`;
      withPriority.forEach(p=>{
        html+=`<div style="display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #2a1a0a">
          <div style="background:${p.bg};border:1px solid ${p.color}33;border-radius:6px;padding:3px 7px;flex-shrink:0;margin-top:2px">
            <div style="font-size:9px;font-weight:700;color:${p.color};letter-spacing:.06em;white-space:nowrap">${p.priority}</div>
          </div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <span style="font-weight:600;font-size:14px">${p.name}</span>
              <span style="font-weight:700;color:${p.color};flex-shrink:0;margin-left:8px">${fmt(p.amount)}</span>
            </div>
            <div style="font-size:12px;color:#555;margin-top:2px">${p.advice}</div>
          </div>
        </div>`;
      });
      html+=`<div style="margin-top:12px;padding:10px;background:#0f0a06;border-radius:8px;font-size:12px;color:#7c7f96;line-height:1.6">
        Pay MUST PAY first, then SOON if you can. CAN WAIT items won't cause immediate damage — contact the creditor if you'll miss a due date.
      </div>
      <div style="margin-top:10px">
        <div style="font-size:11px;color:#555;margin-bottom:4px">Tight week threshold: <strong style="color:#e0923b">${fmt(tightThreshold)}</strong> — adjust below</div>
        <input type="range" min="300" max="1000" step="50" value="${tightThreshold}" oninput="setTightThreshold(this.value)" style="width:100%;accent-color:#e0923b">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#444"><span>£300</span><span>£1,000</span></div>
      </div>
      </div>`;
    }

    // Sweep setting
    html+=`<div class="card"><div class="row" style="align-items:center">
      <div><div style="font-size:13px;font-weight:600">Default sweep</div><div style="font-size:12px;color:#7c7f96;margin-top:2px">% of income that goes to the pot</div></div>
      <div style="font-weight:700;font-size:18px;color:#5b8def">${sweepPct}%</div>
    </div>
    <input type="range" min="20" max="80" step="5" value="${sweepPct}" oninput="setSweep(this.value)" style="width:100%;margin-top:10px;accent-color:#5b8def">
    <div class="slider-ends"><span>20%</span><span>80%</span></div>
    </div>`;

    // Notification settings
    html+=`<div class="card">
      <div class="row" style="align-items:center;margin-bottom:${notificationsEnabled?'10px':'0'}">
        <div><div style="font-size:13px;font-weight:600">Notifications</div><div style="font-size:12px;color:#7c7f96;margin-top:2px">Push reminders for upcoming due dates</div></div>
        <button onclick="toggleNotifications()" style="width:44px;height:24px;border-radius:12px;border:none;background:${notificationsEnabled?'#5b8def':'#2a2d3e'};position:relative;flex-shrink:0;padding:0">
          <div style="width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:${notificationsEnabled?'23px':'3px'};transition:left .15s"></div>
        </button>
      </div>`;
    if(notificationsEnabled){
      html+=`<div style="font-size:11px;color:#555;margin-bottom:6px">Notify this many days before a due date</div>
      <div style="display:flex;gap:6px;margin-bottom:12px">
        ${[1,2,3].map(n=>`<button onclick="setNotifyDays(${n})" style="flex:1;padding:8px;border-radius:6px;border:1px solid ${notifyDaysBefore===n?'#5b8def':'#2a2d3e'};background:${notifyDaysBefore===n?'#141a2e':'#0f1117'};color:${notifyDaysBefore===n?'#5b8def':'#7c7f96'};font-size:13px;font-weight:600">${n} day${n===1?'':'s'}</button>`).join('')}
      </div>
      ${renderDevicePushRow()}
      <button class="btn-ghost" style="width:100%" onclick="sendTestNotification()">Send test notification</button>
      ${notifyTestStatus?`<div style="font-size:11px;color:#7c7f96;margin-top:8px;text-align:center">${notifyTestStatus}</div>`:''}`;
    }
    html+=`</div>`;
  }

  // ---------- WHAT IF ----------
  else if(view==='whatif'){
    const baseMonths=months.length;
    const baseDate=getMonthLabel(baseMonths,true);
    html+=`<p class="desc">See how much a lump sum or extra monthly payment would accelerate your plan.</p>`;

    // Lump sum section
    html+=`<div class="card" style="border-radius:12px;margin-bottom:12px">
      <h2>One-off lump sum</h2>
      <div style="font-size:13px;color:#7c7f96;margin-bottom:14px">What if you threw an extra payment at your current target right now?</div>
      <div class="field-label">Extra amount (£)</div>
      <input id="lumpInput" class="field-input" type="number" inputmode="decimal" placeholder="e.g. 500" style="font-size:18px;padding:12px;margin-bottom:14px" oninput="calcLump()">
      <div id="lumpResult" style="display:none;background:#0f1117;border-radius:8px;padding:12px;font-size:13px">
        <div class="row" style="margin-bottom:8px">
          <span style="color:#7c7f96">Current debt-free date</span>
          <span style="font-weight:600">${baseDate}</span>
        </div>
        <div class="row" style="margin-bottom:8px">
          <span style="color:#7c7f96">New debt-free date</span>
          <strong id="lumpNewDate" style="color:#7db87d"></strong>
        </div>
        <div class="row" style="margin-bottom:4px">
          <span style="color:#7c7f96">Months saved</span>
          <strong id="lumpMonthsSaved" style="color:#7db87d;font-size:18px"></strong>
        </div>
        <div id="lumpTarget" style="font-size:11px;color:#555;margin-top:8px"></div>
      </div>
    </div>`;

    // Extra monthly section
    html+=`<div class="card" style="border-radius:12px;margin-bottom:12px">
      <h2>Extra every month</h2>
      <div style="font-size:13px;color:#7c7f96;margin-bottom:14px">What if you increased your monthly budget?</div>
      <label class="slider-label">Extra per month: <strong id="extraMonthlyLabel" style="color:#5b8def">${fmt(0)}</strong></label>
      <input type="range" min="0" max="1000" step="25" id="extraMonthlySlider" value="0" oninput="calcExtraMonthly(this.value)" style="width:100%;accent-color:#5b8def">
      <div class="slider-ends"><span>£0</span><span>+£1,000/mo</span></div>
      <div id="extraMonthlyResult" style="margin-top:14px;background:#0f1117;border-radius:8px;padding:12px;font-size:13px">
        <div class="row" style="margin-bottom:8px">
          <span style="color:#7c7f96">Current budget</span>
          <span style="font-weight:600">${fmt(budget)}/mo</span>
        </div>
        <div class="row" style="margin-bottom:8px">
          <span style="color:#7c7f96">New budget</span>
          <strong id="extraMonthlyBudget" style="color:#5b8def">${fmt(budget)}/mo</strong>
        </div>
        <div class="row" style="margin-bottom:8px">
          <span style="color:#7c7f96">New debt-free date</span>
          <strong id="extraMonthlyDate" style="color:#7db87d">${baseDate}</strong>
        </div>
        <div class="row">
          <span style="color:#7c7f96">Months saved</span>
          <strong id="extraMonthlySaved" style="color:#7db87d;font-size:18px">0</strong>
        </div>
      </div>
    </div>`;

    // Comparison table for common extra amounts
    const extras=[100,200,300,500];
    html+=`<div class="card" style="border-radius:12px">
      <h2>Quick comparison</h2>
      <div style="font-size:12px;color:#7c7f96;margin-bottom:12px">How different monthly increases change the finish line.</div>`;
    extras.forEach(extra=>{
      const newM=simulate(debts,budget+extra).length;
      const saved=baseMonths-newM;
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a2d3e">
        <span style="font-size:13px;color:#e8e8ec">+${fmt(extra)}/mo</span>
        <div style="text-align:right">
          <div style="font-weight:700;color:#7db87d">${getMonthLabel(newM,true)}</div>
          <div style="font-size:11px;color:#555">${saved>0?saved+' months sooner':'no change'}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // ---------- MONTHLY SCHEDULE ----------
  else if(view==='monthly'){
    const phase=cm?.phase==='arrears';
    html+=`<p class="desc">The full month-by-month plan. Phase 1 clears arrears, Phase 2 is the snowball.</p>
    <div class="phase-badge" style="background:${phase?'#3a1a1a':'#1a2535'};color:${phase?'#e05c5c':'#5b8def'};border:1px solid ${phase?'#5a2a2a':'#2a3d52'}">${phase?'⚠ Arrears phase':'❄ Snowball phase'}</div>
    ${phaseSwitch?`<span style="font-size:12px;color:#555;margin-left:10px">Snowball starts ${getMonthLabel(phaseSwitch.month,true)}</span>`:''}
    <div class="month-nav"><button onclick="changeMonth(-1)">‹</button>
      <div class="month-display"><div style="font-size:16px;font-weight:700;color:#fff">${getMonthLabel(selectedMonth)}</div><div style="font-size:11px;color:#7c7f96;margin-top:2px">Month ${selectedMonth} of ${totalMonths}</div></div>
      <button onclick="changeMonth(1)">›</button></div>`;
    if(cm){
      html+=`<div class="total-card"><div class="row"><div><div style="font-size:11px;color:#7c9fb5;text-transform:uppercase;letter-spacing:.08em">Total out this month</div><div style="font-size:26px;font-weight:700;color:#5b8def;margin-top:2px">${fmt(cm.totalOut)}</div></div></div></div>`;
      cm.payments.filter(p=>p.wasActive||p.total>0.005).forEach((p,i)=>{
        const debt=debts.find(d=>d.id===p.id);
        const isSB=p.extra>0.005,isArr=p.arrearsPaid>0.005,isClr=p.cleared&&p.wasActive;
        const bg=isClr?'card-green':isSB||isArr?'card-blue':'';
        html+=`<div class="card ${bg}"><div class="row"><div style="display:flex;align-items:flex-start;gap:8px"><div class="dot" style="background:${COLORS[i%COLORS.length]}"></div><div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-weight:600;font-size:15px">${p.name}</span>${isSB?'<span class="badge badge-blue">SNOWBALL</span>':''}${isArr?'<span class="badge badge-red">CLEARING ARREARS</span>':''}${isClr?'<span class="badge badge-green">CLEARED ✓</span>':''}</div>
          <div style="font-size:12px;color:#7c7f96;margin-top:3px">${isSB?`Min <strong style="color:#e8e8ec">${fmt(p.minPaid)}</strong> + snowball <strong style="color:#5b8def">${fmt(p.extra)}</strong>`:''}${isArr?`Min <strong style="color:#e8e8ec">${fmt(p.minPaid)}</strong> + arrears <strong style="color:#e05c5c">${fmt(p.arrearsPaid)}</strong>`:''}${!isSB&&!isArr&&p.total>0.005?'Minimum payment':''}</div>
          ${debt?.due?`<div style="font-size:11px;color:#555;margin-top:2px">Due ${ord(debt.due)}</div>`:''}
          </div></div><div style="text-align:right;flex-shrink:0;margin-left:8px"><div style="font-size:22px;font-weight:700;color:${isClr?'#7db87d':isSB?'#5b8def':isArr?'#e05c5c':'#e8e8ec'}">${p.total>0.005?fmt(p.total):'—'}</div>${p.remaining>0.005?`<div style="font-size:11px;color:#555;margin-top:1px">${fmt(p.remaining)} left</div>`:''}</div></div></div>`;
      });
    }
  }

  // ---------- MILESTONES ----------
  else if(view==='milestones'){
    html+=`<p class="desc"><span style="color:#e05c5c;font-weight:600">Phase 1</span> — arrears cleared by ${phaseSwitch?getMonthLabel(phaseSwitch.month,true):'—'}. <span style="color:#5b8def;font-weight:600">Phase 2</span> — snowball.<br>Debt-free: <strong style="color:#7db87d">${getMonthLabel(totalMonths)}</strong></p>`;
    const active=debts.filter(d=>d.balance>0);
    active.forEach((d,i)=>{
      const m=milestones[d.id];
      html+=`<div style="display:flex;gap:12px;margin-bottom:12px;align-items:flex-start"><div class="milestone-line"><div class="milestone-dot" style="background:${m?COLORS[i%COLORS.length]:'#2a2d3e'}">${i+1}</div>${i<active.length-1?'<div class="connector"></div>':''}</div>
        <div class="card" style="flex:1;margin:0"><div class="row"><div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span style="font-weight:600">${d.name}</span>${d.arrears>0?'<span class="badge badge-red">ARREARS</span>':''}</div>
        <div style="font-size:12px;color:#7c7f96;margin-top:3px;display:flex;gap:12px;flex-wrap:wrap"><span>${fmt(d.balance)}</span>${d.arrears>0?`<span style="color:#e05c5c">${fmt(d.arrears)} overdue</span>`:''}<span>${d.apr>0?d.apr+'% APR':'0%'}</span></div></div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px"><div style="font-size:14px;font-weight:700;color:${m?'#7db87d':'#7c7f96'}">${m?getMonthLabel(m,true):'—'}</div>${m?`<div style="font-size:11px;color:#555">Month ${m}</div>`:''}</div></div></div></div>`;
    });
    const hmrc=debts.find(d=>d.id===11);
    html+=`<div class="card card-yellow"><div style="font-weight:600">HMRC — ${fmt(hmrc?.balance??0)}</div><div style="font-size:12px;color:#b5b07c;margin-top:4px">Not in the snowball. Call 0300 200 3835 to agree Time to Pay.</div></div>`;
  }

  // ---------- HISTORY ----------
  else if(view==='history'){
    const initialTotal=DEBTS_INITIAL.reduce((s,d)=>s+d.balance,0);
    const totalPaidAllTime=history.reduce((s,h)=>s+h.totalPaid,0);
    const latestTotal=history.length?history[0].debtSnapshot.reduce((s,d)=>s+d.balance,0):totalDebt;
    const totalReduction=initialTotal-latestTotal;
    html+=`<p class="desc">Every completed cycle, archived automatically — nothing is ever deleted.</p>`;
    html+=`<div class="total-card">
      <div class="row" style="margin-bottom:8px"><span style="color:#7c7f96;font-size:12px">Total paid across all cycles</span><strong style="color:#7db87d">${fmt(totalPaidAllTime)}</strong></div>
      <div class="row"><span style="color:#7c7f96;font-size:12px">Total debt reduction</span><strong style="color:#5b8def">${fmt(totalReduction)}</strong></div>
    </div>`;
    if(!history.length){
      html+=`<div class="card"><div style="font-size:13px;color:#7c7f96">No cycles completed yet — this fills in after your first "Start new cycle".</div></div>`;
    }
    history.forEach((h,i)=>{
      const cycleTotal=h.debtSnapshot.reduce((s,d)=>s+d.balance,0);
      const prev=history[i+1];
      const prevTotal=prev?prev.debtSnapshot.reduce((s,d)=>s+d.balance,0):initialTotal;
      const reduced=prevTotal-cycleTotal;
      const cleared=h.debtsPaid.filter(p=>{
        const snap=h.debtSnapshot.find(d=>d.id===p.id);
        return snap&&snap.balance<=0.005;
      });
      const dateRange=`${h.startedAt?new Date(h.startedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'—'} → ${new Date(h.closedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`;
      html+=`<div class="card" style="border-radius:12px;margin-bottom:12px">
        <div class="row" style="margin-bottom:8px">
          <span style="font-weight:700;font-size:14px">Cycle ${h.cycleNumber}</span>
          <span style="font-size:11px;color:#555">${dateRange}</span>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#7c7f96;margin-bottom:${reduced>0.005||cleared.length?'8px':'0'}">
          <span>In: <strong style="color:#e8e8ec">${fmt(h.totalIncome)}</strong></span>
          <span>Paid: <strong style="color:#7db87d">${fmt(h.totalPaid)}</strong></span>
          <span>Balance at close: <strong style="color:#e8e8ec">${fmtS(cycleTotal)}</strong></span>
        </div>
        ${reduced>0.005?`<div style="background:#0f1117;border-radius:6px;height:5px;overflow:hidden;margin-bottom:6px"><div style="width:${Math.min(100,Math.max(2,(reduced/Math.max(prevTotal,1))*100))}%;height:100%;background:#7db87d"></div></div><div style="font-size:11px;color:#7db87d;${cleared.length?'margin-bottom:6px':''}">${fmt(reduced)} reduced this cycle</div>`:''}
        ${cleared.length?`<div style="font-size:12px;color:#7db87d">🎉 Cleared: ${cleared.map(c=>c.name).join(', ')}</div>`:''}
      </div>`;
    });
  }

  // ---------- EDIT ----------
  else if(view==='edit'){
    html+=`<p class="desc">Update figures as things change. Tap Save to recalculate.</p>`;
    debts.forEach((d,i)=>{
      const ev=editDraft[d.id]||{balance:d.balance,apr:d.apr,min:d.min,arrears:d.arrears,due:d.due??'',account:d.account||'personal',note:d.note};
      html+=`<div class="card" style="border-radius:12px;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div class="dot" style="background:${COLORS[i%COLORS.length]};margin-top:0"></div><span style="font-weight:700;font-size:15px">${d.name}</span>${d.arrears>0?'<span class="badge badge-red">ARREARS</span>':''}</div>
      <div class="edit-grid">${[['balance','Balance (£)'],['arrears','Arrears (£)'],['apr','APR (%)'],['min','Min. Payment (£)'],['due','Due Date (day)']].map(([f,label])=>`<div><div class="field-label">${label}</div><input class="field-input" type="number" min="0" step="${f==='apr'?'0.1':f==='due'?'1':'0.01'}" value="${ev[f]}" oninput="updateDraft(${d.id},'${f}',this.value)"></div>`).join('')}<div><div class="field-label" style="color:${ev.account==='business'?'#e0923b':'#5b8def'}">Account</div><select class="field-input" style="background:#0f1117;color:#e8e8ec" onchange="updateDraft(${d.id},'account',this.value)"><option value="personal" ${ev.account==='personal'?'selected':''}>Personal</option><option value="business" ${ev.account==='business'?'selected':''}>Business</option></select></div><div style="grid-column:1/-1"><div class="field-label">Note</div><input class="field-input" type="text" value="${esc(ev.note||'')}" oninput="updateDraft(${d.id},'note',this.value)"></div></div></div>`;
    });
    html+=`<div style="display:flex;gap:10px;margin-top:4px"><button id="saveBtn" class="btn-primary" style="flex:1" onclick="applyEdits()">Save &amp; Recalculate</button><button class="btn-ghost" onclick="resetDebts()">Reset</button></div>`;
  }

  // ---------- OVERVIEW ----------
  else if(view==='overview'){
    html+=`<p class="desc">All debts at a glance.</p>`;
    debts.forEach((d,i)=>{
      html+=`<div class="card"><div class="row"><div style="display:flex;align-items:flex-start;gap:8px"><div class="dot" style="background:${COLORS[i%COLORS.length]}"></div><div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span style="font-weight:600;font-size:14px">${d.name}</span>${d.arrears>0?'<span class="badge badge-red">ARREARS</span>':''}</div>
      <div style="font-size:12px;color:#7c7f96;margin-top:3px;display:flex;gap:12px;flex-wrap:wrap">${d.apr>0?`<span>${d.apr}% APR</span>`:''}${d.min>0?`<span>Min: ${fmt(d.min)}</span>`:''}${d.due?`<span>Due: ${ord(d.due)}</span>`:''}${d.arrears>0?`<span style="color:#e05c5c">Arrears: ${fmt(d.arrears)}</span>`:''}</div>
      ${d.note?`<div style="font-size:11px;color:#555;margin-top:3px;font-style:italic">${esc(d.note)}</div>`:''}</div></div>
      <div style="font-size:18px;font-weight:700;color:${d.balance===0?'#3a4a3a':'#e8e8ec'};flex-shrink:0;margin-left:8px">${fmt(d.balance)}</div></div></div>`;
    });
  }

  // ---------- BORROWED ----------
  // Standalone notes tab: no read/write of any other app state or calculation.
  else if(view==='borrowed'){
    html+=`<p class="desc">Track informal short-term borrowing — from people or from your own savings pots. Purely for notes; nothing here affects the debt plan.</p>`;
    const grandTotal=borrowedActive.reduce((s,b)=>s+b.amount,0);
    const sourceCount=new Set(borrowedActive.map(b=>b.source_name)).size;
    if(grandTotal<=0.005){
      html+=`<div class="card card-green" style="text-align:center;padding:20px;border-radius:12px;margin-bottom:16px">
        <div style="font-size:16px;font-weight:700;color:#7db87d">Nothing outstanding ✓</div>
        <div style="font-size:12px;color:#7c9f7c;margin-top:4px">Keep it that way.</div>
      </div>`;
    }else{
      html+=`<div class="total-card" style="background:linear-gradient(135deg,#1a2535,#141a2e);margin-bottom:16px">
        <div style="font-size:10px;color:#7c9fb5;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Total borrowed</div>
        <div style="font-size:32px;font-weight:800;color:#fff">${fmt(grandTotal)}</div>
        <div style="font-size:12px;color:#7c7f96;margin-top:4px">${borrowedActive.length} active loan${borrowedActive.length===1?'':'s'} across ${sourceCount} source${sourceCount===1?'':'s'}</div>
      </div>`;
    }

    // Group active loans by source: savings-flagged first, then alphabetical.
    const groups={};
    borrowedActive.forEach(b=>{
      const key=b.source_name+'|'+b.is_savings;
      if(!groups[key])groups[key]={source_name:b.source_name,is_savings:b.is_savings,items:[],total:0};
      groups[key].items.push(b);
      groups[key].total+=b.amount;
    });
    const groupList=Object.values(groups).sort((a,b)=>{
      if(a.is_savings!==b.is_savings)return a.is_savings?-1:1;
      return a.source_name.localeCompare(b.source_name);
    });

    groupList.forEach(g=>{
      html+=`<div class="card" style="border-radius:12px;margin-bottom:12px">
        <div class="row" style="margin-bottom:8px;align-items:center">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="dot" style="background:${g.is_savings?'#7db87d':'#5b8def'};margin-top:0"></div>
            <span style="font-weight:700;font-size:15px">${esc(g.source_name)}</span>
            <span class="badge" style="background:${g.is_savings?'#0d1a0d':'#0a1228'};color:${g.is_savings?'#7db87d':'#5b8def'}">${g.is_savings?'SAVINGS':'PERSON'}</span>
          </div>
          <strong style="color:#e8e8ec">${fmt(g.total)} total</strong>
        </div>`;
      g.items.forEach((b,i)=>{
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;${i<g.items.length-1?'border-bottom:1px solid #2a2d3e':''}">
          <div>
            <div style="font-size:13px;color:${b.note?'#e8e8ec':'#555'}">${esc(b.note)||'No note'}</div>
            <div style="font-size:11px;color:#555;margin-top:1px">${formatBorrowedDate(b.borrowed_at)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <strong>${fmt(b.amount)}</strong>
            <button onclick="openRepayModal(${b.id})" style="padding:5px 10px;border-radius:6px;border:1px solid #2a4a2a;background:transparent;color:#7db87d;font-size:11px;font-weight:600">Repaid ✓</button>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });

    html+=`<div style="${borrowedActive.length?'':'text-align:center'};margin-bottom:16px"><button class="btn-primary" ${borrowedActive.length?'style="width:100%"':'style="padding:12px 24px"'} onclick="openAddLoanModal()">+ Log a loan</button></div>`;

    html+=`<div class="card" style="border-radius:12px">
      <button onclick="repaidLogExpanded=!repaidLogExpanded;renderAll()" style="width:100%;background:none;border:none;color:#7c7f96;font-size:13px;font-weight:600;text-align:left;padding:0;cursor:pointer">${repaidLogExpanded?'▼':'▶'} Repaid (${borrowedRepaid.length})</button>`;
    if(repaidLogExpanded){
      borrowedRepaid.forEach((b,i)=>{
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;${i<borrowedRepaid.length-1?'border-bottom:1px solid #2a2d3e':''};margin-top:${i===0?'12px':'0'}">
          <div>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:13px;color:#555">${esc(b.source_name)}</span>
              <span style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.06em">${b.is_savings?'savings':'person'}</span>
            </div>
            <div style="font-size:11px;color:#555;margin-top:1px">${esc(b.note)||'No note'} · ${formatBorrowedDate(b.borrowed_at)} → ${formatBorrowedDate(b.repaid_at)}</div>
          </div>
          <strong style="color:#555;text-decoration:line-through">${fmt(b.amount)}</strong>
        </div>`;
      });
    }
    html+=`</div>`;
  }

  document.getElementById('tabContent').innerHTML=html;
}

// ---------- Cash flow actions ----------
function getCycleTotals(){
  // Calculate how much is needed from each account this cycle
  const cp=getCyclePayments();
  const businessTotal=cp.filter(p=>{const d=debts.find(x=>x.id===p.id);return d&&d.account==='business';}).reduce((s,p)=>s+p.amount,0);
  const personalTotal=cp.filter(p=>{const d=debts.find(x=>x.id===p.id);return d&&d.account==='personal';}).reduce((s,p)=>s+p.amount,0);
  return {businessTotal,personalTotal};
}

function updateSweepPreview(){
  const amt=parseNum(document.getElementById('logAmount').value);
  if(!amt){return;}
  const {businessTotal,personalTotal}=getCycleTotals();
  // Business pot: proportion of cycle total that is business
  const cycleTotal=businessTotal+personalTotal;
  // Split the debt sweep (sweepPct%) proportionally between business and personal
  const totalSweep=amt*sweepPct/100;
  const bizSweep=cycleTotal>0?(businessTotal/cycleTotal)*totalSweep:totalSweep/2;
  const perSweep=totalSweep-bizSweep;
  const saved=amt*savingsPct/100;
  const keep=Math.max(0,amt-bizSweep-perSweep-saved);
  // Apply manual overrides if user has typed into override fields
  const manBiz=document.getElementById('logBiz')?.value;
  const manPer=document.getElementById('logPer')?.value;
  const manSaved=document.getElementById('logSaved')?.value;
  const finalBiz=manBiz!==''&&manBiz!==undefined?parseNum(manBiz):bizSweep;
  const finalPer=manPer!==''&&manPer!==undefined?parseNum(manPer):perSweep;
  const finalSaved=manSaved!==''&&manSaved!==undefined?parseNum(manSaved):saved;
  const finalKeep=Math.max(0,amt-finalBiz-finalPer-finalSaved);
  const biz=document.getElementById('bizPreview');
  const per=document.getElementById('perPreview');
  const sav=document.getElementById('savingsPreview');
  const keep2=document.getElementById('keepPreview');
  if(biz)biz.textContent=fmt(manBiz!==''&&manBiz!==undefined?finalBiz:bizSweep);
  if(per)per.textContent=fmt(manPer!==''&&manPer!==undefined?finalPer:perSweep);
  if(sav)sav.textContent=fmt(manSaved!==''&&manSaved!==undefined?finalSaved:saved);
  if(keep2)keep2.textContent=fmt(finalKeep);
  // Transfer totals
  const tBiz=document.getElementById('transferBiz');
  const tPer=document.getElementById('transferPer');
  if(tBiz)tBiz.textContent=fmt(manBiz!==''&&manBiz!==undefined?finalBiz:bizSweep);
  if(tPer)tPer.textContent=fmt((manPer!==''&&manPer!==undefined?finalPer:perSweep)+(manSaved!==''&&manSaved!==undefined?finalSaved:saved)+finalKeep);
  // Show tight week banner if below threshold
  const tightBanner=document.getElementById('tightWeekBanner');
  if(tightBanner)tightBanner.style.display=amt>0&&amt<tightThreshold?'block':'none';
}
async function confirmLog(){
  const amt=parseNum(document.getElementById('logAmount').value);
  if(amt<=0){closeModal();return;}
  const {businessTotal,personalTotal}=getCycleTotals();
  const cycleTotal=businessTotal+personalTotal;
  const totalSweep=amt*sweepPct/100;
  const autoBiz=cycleTotal>0?(businessTotal/cycleTotal)*totalSweep:totalSweep/2;
  const autoPer=totalSweep-autoBiz;
  const autoSaved=amt*savingsPct/100;
  const manBiz=document.getElementById('logBiz')?.value;
  const manPer=document.getElementById('logPer')?.value;
  const manSaved=document.getElementById('logSaved')?.value;
  const bizAmt=manBiz!==''&&manBiz!==undefined?parseNum(manBiz):autoBiz;
  const perAmt=manPer!==''&&manPer!==undefined?parseNum(manPer):autoPer;
  const savedAmt=manSaved!==''&&manSaved!==undefined?parseNum(manSaved):autoSaved;
  bizPot+=bizAmt;
  perPot+=perAmt;
  savingsPot+=savedAmt;
  const date=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const entry={amount:amt,bizAmt,perAmt,savedAmt,date};
  closeModal();renderAll();
  try{
    const res=await fetch('/debt/api/income',{method:'POST',headers:JSON_HEADERS,body:JSON.stringify(entry)});
    if(!res.ok)throw new Error('income save failed: '+res.status);
    const saved=await res.json();
    entry.id=saved.id;
  }catch(err){saveError=true;console.error('Failed to save income entry',err);}
  incomeLog.push(entry);
  persist('cashflow');renderAll();
}

function togglePaid(id){
  const cyclePayments=getCyclePayments();
  const p=cyclePayments.find(x=>x.id===id);
  if(!p)return;
  const debt=debts.find(d=>d.id===id);
  const isBiz=debt?.account==='business';
  if(paidThisCycle.includes(id)){
    paidThisCycle=paidThisCycle.filter(x=>x!==id);
    if(isBiz)bizPot+=p.amount; else perPot+=p.amount;
  }else{
    paidThisCycle.push(id);
    if(isBiz)bizPot=Math.max(0,bizPot-p.amount); else perPot=Math.max(0,perPot-p.amount);
  }
  persist('cashflow');renderAll();
}
async function deleteIncome(idx){
  const e=incomeLog[idx];
  if(!e)return;
  bizPot=Math.max(0,bizPot-(e.bizAmt||0));
  perPot=Math.max(0,perPot-(e.perAmt||0));
  savingsPot=Math.max(0,savingsPot-(e.savedAmt||0));
  incomeLog.splice(idx,1);
  persist('cashflow');renderAll();
  if(e.id!=null){
    try{ await fetch('/debt/api/income/'+e.id,{method:'DELETE'}); }
    catch(err){ console.error('Failed to delete income entry',err); }
  }
}
let syncDraft={};
// Adopt the fresh updated_at values new-cycle returns — its server-side
// writes bump the timestamps, and without this the next ordinary save would
// look stale and 409 as a phantom "updated on another device".
function adoptCycleTimestamps(body){
  if(!body)return;
  if(body.debtsUpdatedAt)debtsUpdatedAt=body.debtsUpdatedAt;
  if(body.cashflowUpdatedAt)cashflowUpdatedAt=body.cashflowUpdatedAt;
  if(body.settingsUpdatedAt)settingsUpdatedAt=body.settingsUpdatedAt;
}

function openSyncBalances(){
  // Seed the draft with the PROJECTED balance after one cycle (month 1 of the sim).
  // This mirrors what the plan expects to happen, giving a realistic starting estimate to tweak.
  syncDraft={};
  const months=getSim();
  const m1=months[0];
  debts.forEach(d=>{
    if(d.balance<=0.005)return;
    let projected=d.balance;
    if(m1){
      const p=m1.payments.find(x=>x.id===d.id);
      if(p&&p.wasActive){ projected=p.remaining; }
    }
    syncDraft[d.id]=projected.toFixed(2);
  });
  renderSyncModal();
}

async function confirmSync(){
  const archivePayload=getCycleArchivePayload(); // must read before debts/paidThisCycle change
  debts=debts.map(d=>{
    if(syncDraft[d.id]===undefined)return d;
    const nb=parseNum(syncDraft[d.id]);
    // Arrears can't exceed the new balance
    const na=Math.min(d.arrears,nb);
    return {...d,balance:nb,arrears:na};
  });
  // Clear the cycle too
  paidThisCycle=[];
  incomeLog=[];
  syncDraft={};
  selectedMonth=1;
  closeModal();renderAll();
  try{
    // new-cycle writes the synced balances and clears the cycle server-side,
    // so there's nothing left for persist() to send — just adopt timestamps.
    const res=await fetch('/debt/api/new-cycle',{method:'POST',headers:JSON_HEADERS,body:JSON.stringify({debts,...archivePayload})});
    if(res.ok)adoptCycleTimestamps(await res.json().catch(()=>null));
    else{saveError=true;}
  }catch(err){saveError=true;console.error('Failed to start new cycle',err);}
  await Promise.all([refreshHistory(),refreshCycleStatus()]);renderAll();
}
async function confirmNewCycle(){
  const archivePayload=getCycleArchivePayload(); // must read before paidThisCycle/incomeLog clear

  closeModal();renderAll();

  await Promise.all([refreshHistory(),refreshCycleStatus()]);renderAll();
}

function confirmSurplus(){
  const target=getCurrentTarget();
  const isBiz=target?.account==='business';
  const surplusAmt=isBiz?bizPot:perPot;
  if(!target||surplusAmt<=0.005){closeModal();return;}
  const amount=surplusAmt;
  const newBal=Math.max(0,target.balance-amount);
  const newArrears=Math.min(target.arrears,newBal);
  debts=debts.map(d=>d.id===target.id?{...d,balance:newBal,arrears:newArrears}:d);
  if(isBiz)bizPot=0; else perPot=0;
  persist('debts','cashflow');closeModal();renderAll();
}

// ---------- Web Push (this device) ----------
// The "Push to this device" row inside the Notifications card. ntfy needs
// no per-device state (the phone's ntfy app subscribes on its own), but Web
// Push is per-device: each phone/desktop enables itself here and gets its
// own subscription row server-side.
function renderDevicePushRow(){
  let inner='';
  if(pushState==='on'){
    inner=`<span style="font-size:12px;color:#7db87d;font-weight:600">Enabled ✓</span>
      <button onclick="disableDevicePush()" style="margin-left:10px;padding:5px 10px;border-radius:6px;border:1px solid #3a3d52;background:#0f1117;color:#7c7f96;font-size:11px;font-weight:600">Disable</button>`;
  }else if(pushState==='off'){
    inner=`<button onclick="enableDevicePush()" style="padding:6px 12px;border-radius:6px;border:1px solid #2a3a5e;background:#141a2e;color:#5b8def;font-size:12px;font-weight:600">Enable</button>`;
  }else if(pushState==='busy'||pushState==='init'){
    inner=`<span style="font-size:12px;color:#7c7f96">Working…</span>`;
  }
  let hint='';
  if(pushState==='need-install')hint='To get notifications on this iPhone, add the app to your Home Screen first (Share → Add to Home Screen), then enable push from the installed app.';
  else if(pushState==='denied')hint='Notifications are blocked for this app — allow them in your device settings, then try again.';
  else if(pushState==='unsupported')hint='This browser can’t receive push — notifications will still go to ntfy if that’s set up.';
  return `<div class="row" style="align-items:center;margin-bottom:${hint?'6px':'12px'}">
    <div><div style="font-size:12px;font-weight:600">Push to this device</div><div style="font-size:11px;color:#555;margin-top:1px">Notifications straight to this phone — no extra app</div></div>
    <div style="display:flex;align-items:center;flex-shrink:0">${inner}</div>
  </div>${hint?`<div style="font-size:11px;color:#7c7f96;line-height:1.5;margin-bottom:12px">${hint}</div>`:''}`;
}

async function initPush(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)||!('Notification' in window)){pushState='unsupported';renderAll();return;}
  try{
    // Scope '/debt' out-specifics the estimator sw.js's '/' scope, so this
    // worker (push-only, no fetch handler) controls /debt and /debt.html.
    swRegistration=await navigator.serviceWorker.register('/debt-sw.js',{scope:'/debt'});
    const sub=await swRegistration.pushManager.getSubscription();
    if(sub){
      pushState='on';
      // Re-assert the subscription server-side: it costs one upsert and
      // heals the case where the DB row was lost (or iOS rotated keys).
      fetch('/debt/api/push/subscribe',{method:'POST',headers:JSON_HEADERS,body:JSON.stringify({subscription:sub.toJSON()})}).catch(()=>{});
    }else if(Notification.permission==='denied'){
      pushState='denied';
    }else{
      // iOS only exposes push to web apps launched from the Home Screen —
      // in a Safari tab the buttons would just fail, so show the install
      // hint instead.
      const isIOS=/iP(hone|ad|od)/.test(navigator.userAgent)||(navigator.userAgent.indexOf('Mac')!==-1&&'ontouchend' in document);
      const standalone=(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||navigator.standalone===true;
      pushState=(isIOS&&!standalone)?'need-install':'off';
    }
  }catch(err){
    console.error('Push init failed',err);
    pushState='unsupported';
  }
  renderAll();
}

function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

async function enableDevicePush(){
  pushState='busy';renderAll();
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){pushState=perm==='denied'?'denied':'off';renderAll();return;}
    const keyRes=await fetch('/debt/api/push/public-key');
    if(!keyRes.ok)throw new Error('public key fetch failed');
    const {publicKey}=await keyRes.json();
    const sub=await swRegistration.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(publicKey)});
    const res=await fetch('/debt/api/push/subscribe',{method:'POST',headers:JSON_HEADERS,body:JSON.stringify({subscription:sub.toJSON()})});
    if(!res.ok){await sub.unsubscribe().catch(()=>{});throw new Error('subscribe save failed');}
    pushState='on';
  }catch(err){
    console.error('Enable push failed',err);
    pushState='off';
    notifyTestStatus='Could not enable push on this device.';
    setTimeout(()=>{notifyTestStatus='';renderAll();},5000);
  }
  renderAll();
}

async function disableDevicePush(){
  pushState='busy';renderAll();
  try{
    const sub=swRegistration&&await swRegistration.pushManager.getSubscription();
    if(sub){
      await fetch('/debt/api/push/unsubscribe',{method:'POST',headers:JSON_HEADERS,body:JSON.stringify({endpoint:sub.endpoint})}).catch(()=>{});
      await sub.unsubscribe();
    }
    pushState='off';
  }catch(err){console.error('Disable push failed',err);pushState='off';}
  renderAll();
}
async function sendTestNotification(){
  notifyTestStatus='Sending…';renderAll();
  try{
    const res=await fetch('/debt/api/notify-test',{method:'POST'});
    if(res.ok){notifyTestStatus='Sent — check your phone.';}
    else{const body=await res.json().catch(()=>({}));notifyTestStatus=body.error||'Failed to send.';}
  }catch(err){notifyTestStatus='Failed to send.';}
  renderAll();
  setTimeout(()=>{notifyTestStatus='';renderAll();},5000);
}
function calcLump(){
  const extra=parseNum(document.getElementById('lumpInput').value);
  const result=document.getElementById('lumpResult');
  const target=document.getElementById('lumpTarget');
  if(!result)return;
  if(extra<=0.005){result.style.display='none';return;}
  // Apply lump to current target debt temporarily
  const tgt=getCurrentTarget();
  if(!tgt){result.style.display='none';return;}
  const modDebts=debts.map(d=>d.id===tgt.id?{...d,balance:Math.max(0,d.balance-extra),arrears:Math.min(d.arrears,Math.max(0,d.balance-extra))}:d);
  const newMonths=simulate(modDebts,budget).length;
  const base=getSim().length;
  const saved=base-newMonths;
  const newDateEl=document.getElementById('lumpNewDate');
  const savedEl=document.getElementById('lumpMonthsSaved');
  if(newDateEl)newDateEl.textContent=getMonthLabel(newMonths,true);
  if(savedEl)savedEl.textContent=saved>0?saved+' months':saved===0?'<1 month — still reduces balance & interest':'—';
  if(target)target.textContent='Applied to: '+tgt.name+' (current target) · balance '+fmt(tgt.balance)+' → '+fmt(Math.max(0,tgt.balance-extra));
  result.style.display='block';
}
function calcExtraMonthly(val){
  const extra=parseInt(val)||0;
  const labelEl=document.getElementById('extraMonthlyLabel');
  const budgetEl=document.getElementById('extraMonthlyBudget');
  const dateEl=document.getElementById('extraMonthlyDate');
  const savedEl=document.getElementById('extraMonthlySaved');
  if(labelEl)labelEl.textContent=fmt(extra);
  if(budgetEl)budgetEl.textContent=fmt(budget+extra)+'/mo';
  const base=getSim().length;
  const newM=simulate(debts,budget+extra).length;
  const saved=base-newM;
  if(dateEl)dateEl.textContent=getMonthLabel(newM,true);
  if(savedEl)savedEl.textContent=saved>0?saved+' months':'0';
}

// ---------- Edit actions ----------
function updateDraft(id,field,val){if(!editDraft[id]){const d=debts.find(x=>x.id===id);editDraft[id]={balance:d.balance,apr:d.apr,min:d.min,arrears:d.arrears,due:d.due??'',note:d.note};}editDraft[id][field]=val;}
function applyEdits(){
  debts=debts.map(d=>{const ev=editDraft[d.id];if(!ev)return d;return{...d,balance:parseNum(ev.balance),apr:parseNum(ev.apr),min:parseNum(ev.min),arrears:parseNum(ev.arrears),due:ev.due===''?null:parseInt(ev.due)||null,account:ev.account||d.account||'personal',note:ev.note};});
  editDraft={};selectedMonth=1;persist('debts');
  const btn=document.getElementById('saveBtn');if(btn){btn.textContent='✓ Saved';btn.style.background='#1a3a1a';btn.style.color='#7db87d';}
  setTimeout(()=>renderAll(),1000);
}

}

function openAddLoanModal(){
  loanIsSavings=false;
  document.getElementById('modalRoot').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2 style="font-size:18px;margin-bottom:16px">Log a loan</h2>

        </div>
        <div class="field-label">Amount (£)</div>
        <input id="loanAmount" class="field-input" type="number" inputmode="decimal" step="0.01" min="0" style="font-size:18px;padding:12px;margin-bottom:14px">

        <input id="loanNote" class="field-input" type="text" style="margin-bottom:14px">

          <button class="btn-ghost" onclick="closeModal()">Cancel</button>

function setLoanType(isSavings){
  loanIsSavings=isSavings;
  const p=document.getElementById('loanTypePerson');
  const s=document.getElementById('loanTypeSavings');
  if(isSavings){
    s.style.borderColor='#7db87d';s.style.background='#0d1a0d';s.style.color='#7db87d';
    p.style.borderColor='#2a2d3e';p.style.background='#1a1d2e';p.style.color='#7c7f96';
  }else{
    p.style.borderColor='#5b8def';p.style.background='#141a2e';p.style.color='#5b8def';
    s.style.borderColor='#2a2d3e';s.style.background='#1a1d2e';s.style.color='#7c7f96';
  }
}
async function confirmAddLoan(){
  const source=document.getElementById('loanSource').value.trim();
  const amount=parseNum(document.getElementById('loanAmount').value);
  const note=document.getElementById('loanNote').value.trim();
  const date=document.getElementById('loanDate').value;
  const errEl=document.getElementById('loanError');
  if(!source){errEl.textContent='Source name is required';errEl.style.display='block';return;}
  if(!amount||amount<=0){errEl.textContent='Amount must be greater than 0';errEl.style.display='block';return;}
  try{
    const res=await fetch('/debt/api/borrowed',{method:'POST',headers:JSON_HEADERS,body:JSON.stringify({source_name:source,is_savings:loanIsSavings,amount,note:note||null,borrowed_at:date||null})});
    if(!res.ok)throw new Error('loan save failed: '+res.status);
  }catch(err){saveError=true;console.error('Failed to save loan',err);}
  closeModal();
  await refreshBorrowed();renderAll();
}
